name: 🤖 Weekly AI Newsletter

on:
  schedule:
    # Cada domingo a las 20:00 UTC+2 (España verano) = 18:00 UTC
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  send-newsletter:
    name: Generar y enviar newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar secrets configurados
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python - <<'EOF'
          import os, sys
          secrets = ["ANTHROPIC_API_KEY", "GMAIL_USER", "GMAIL_APP_PASSWORD", "RECIPIENT_EMAIL"]
          missing = [s for s in secrets if not os.environ.get(s)]
          if missing:
              print(f"❌ Secrets no configurados: {missing}", file=sys.stderr)
              sys.exit(1)
          print("✅ Los 4 secrets están configurados")
          print(f"   GMAIL_USER = {os.environ['GMAIL_USER']}")
          print(f"   RECIPIENT_EMAIL = {os.environ['RECIPIENT_EMAIL']}")
          print(f"   ANTHROPIC_API_KEY = {os.environ['ANTHROPIC_API_KEY'][:8]}...")
          EOF

      - name: Ejecutar newsletter semanal
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          PYTHONUNBUFFERED: "1"
        run: python -u weekly_ai_newsletter.py

      - name: Notificar éxito
        if: success()
        run: echo "✅ Newsletter enviado correctamente el $(date +'%d/%m/%Y a las %H:%M UTC')"

      - name: Notificar fallo
        if: failure()
        run: echo "❌ Error al enviar el newsletter. Revisa los logs anteriores."
