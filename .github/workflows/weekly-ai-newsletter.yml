name: 🤖 Weekly AI Newsletter

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  send-newsletter:
    name: Generar y enviar newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar secrets configurados
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python - <<'EOF'
          import os, sys
          secrets = ["ANTHROPIC_API_KEY", "GMAIL_USER", "GMAIL_APP_PASSWORD", "RECIPIENT_EMAIL"]
          missing = [s for s in secrets if not os.environ.get(s)]
          if missing:
              print(f"Secrets no configurados: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: GMAIL_USER={os.environ['GMAIL_USER']}, RECIPIENT={os.environ['RECIPIENT_EMAIL']}, API_KEY={os.environ['ANTHROPIC_API_KEY'][:8]}...")
          EOF

      - name: Ejecutar newsletter semanal
        id: run_script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u weekly_ai_newsletter.py 2>&1 | tee /tmp/script_output.txt
          exit ${PIPESTATUS[0]}

      - name: Mostrar error como anotacion
        if: failure()
        run: |
          OUTPUT=$(cat /tmp/script_output.txt 2>/dev/null | tail -30 | tr '\n' ' ' | sed 's/"/\\"/g')
          echo "::error title=Newsletter Script Error::${OUTPUT}"
          cat /tmp/script_output.txt

      - name: Exito
        if: success()
        run: echo "Newsletter enviado el $(date +'%d/%m/%Y %H:%M UTC')"
